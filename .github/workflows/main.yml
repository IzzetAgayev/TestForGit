name: Deploy Migrations via Bytebase

on:
  push:
    branches: [master]
    paths:
      - 'migrations/**'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Login to Bytebase
        id: login
        shell: powershell
        run: |
          $body = @{
            email    = "${{ secrets.BYTEBASE_SERVICE_ACCOUNT }}"
            password = "${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}"
          } | ConvertTo-Json

          $response = Invoke-RestMethod -Uri "${{ secrets.BYTEBASE_URL }}/v1/auth/login" `
            -Method POST -ContentType "application/json" -Body $body

          $token = $response.token
          if (-not $token) { $token = $response.accessToken }
          if (-not $token) { Write-Host "No token!"; exit 1 }

          "token=$token" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Host "Authenticated successfully"

      - name: Get changed SQL files
        id: changes
        shell: powershell
        run: |
          $headers = @{ Authorization = "Bearer ${{ github.token }}" }
          $commit = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" `
            -Headers $headers

          $sqlFiles = $commit.files | Where-Object { $_.filename -like "migrations/*.sql" }

          if (-not $sqlFiles -or $sqlFiles.Count -eq 0) {
            Write-Host "No SQL changes detected"
            "has_changes=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
            exit 0
          }

          $changedFiles = @()
          foreach ($f in $sqlFiles) {
            $localPath = Join-Path $env:GITHUB_WORKSPACE $f.filename
            $changedFiles += $localPath
            Write-Host "Changed: $($f.filename) ($($f.status))"
          }

          $fileList = ($changedFiles -join ",")
          "has_changes=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "files=$fileList" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Create and run Bytebase migrations
        if: steps.changes.outputs.has_changes == 'true'
        shell: powershell
        run: |
          $token = "${{ steps.login.outputs.token }}"
          $baseUrl = "${{ secrets.BYTEBASE_URL }}"
          $project = "${{ secrets.BYTEBASE_PROJECT }}"
          $headers = @{ Authorization = "Bearer $token" }

          $files = "${{ steps.changes.outputs.files }}" -split ","

          foreach ($file in $files) {
            $file = $file.Trim()
            if (-not $file) { continue }
            $fileName = Split-Path $file -Leaf

            Write-Host "`n=== Processing: $fileName ==="
            $sql = Get-Content -Path $file -Raw
            Write-Host "SQL: $sql"

            # 1. Sheet yarat
            $sqlBytes = [System.Text.Encoding]::UTF8.GetBytes($sql)
            $sqlBase64 = [Convert]::ToBase64String($sqlBytes)
            $sheetBody = @{ content = $sqlBase64 } | ConvertTo-Json

            $sheet = Invoke-RestMethod -Uri "$baseUrl/v1/$project/sheets" `
              -Method POST -ContentType "application/json" `
              -Headers $headers -Body $sheetBody
            Write-Host "Sheet: $($sheet.name)"

            # 2. Plan yarat
            $planJson = @"
          {
            "title": "Migration: $fileName (commit: ${{ github.sha }})",
            "specs": [
              {
                "id": "$([guid]::NewGuid().ToString())",
                "changeDatabaseConfig": {
                  "targets": ["instances/localprodtest/databases/test"],
                  "sheet": "$($sheet.name)"
                }
              }
            ]
          }
          "@

            $plan = Invoke-RestMethod -Uri "$baseUrl/v1/$project/plans" `
              -Method POST -ContentType "application/json" `
              -Headers $headers -Body $planJson
            Write-Host "Plan: $($plan.name)"

            # 3. Issue yarat
            $issueJson = @"
          {
            "title": "Migration: $fileName",
            "description": "Auto-created from commit ${{ github.sha }} by GitHub Actions",
            "type": "DATABASE_CHANGE",
            "plan": "$($plan.name)"
          }
          "@

            $issue = Invoke-RestMethod -Uri "$baseUrl/v1/$project/issues" `
              -Method POST -ContentType "application/json" `
              -Headers $headers -Body $issueJson
            Write-Host "Issue: $($issue.name)"

            # 4. Rollout yarat
            $rollout = Invoke-RestMethod -Uri "$baseUrl/v1/$($plan.name)/rollout" `
              -Method POST -ContentType "application/json" `
              -Headers $headers -Body '{}'
            Write-Host "Rollout: $($rollout.name)"

            # 5. Task-lari run et
            foreach ($stage in $rollout.stages) {
              $taskNames = @()
              foreach ($task in $stage.tasks) {
                $taskNames += $task.name
              }
              if ($taskNames.Count -gt 0) {
                $runBody = @{ tasks = $taskNames } | ConvertTo-Json
                try {
                  Invoke-RestMethod -Uri "$baseUrl/v1/$($stage.name)/tasks:batchRun" `
                    -Method POST -ContentType "application/json" `
                    -Headers $headers -Body $runBody
                  Write-Host "Tasks running in stage: $($stage.name)"
                } catch {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  Write-Host "Run error: $($reader.ReadToEnd())"
                }
              }
            }

            Write-Host "=== Done: $fileName ==="
          }

          Write-Host "`nAll migrations submitted and running!"
