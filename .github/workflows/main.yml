name: Bytebase GitOps
on:
  push:
    branches:
      - master
    paths:
      - 'migrations/**'

jobs:
  bytebase-release:
    runs-on: ubuntu-latest
    container:
      image: bytebase/bytebase-action:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Roll out database change
        env:
          BYTEBASE_URL: ${{ vars.BYTEBASE_URL }}
          BYTEBASE_SERVICE_ACCOUNT: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT }}
          BYTEBASE_SERVICE_ACCOUNT_SECRET: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}
          BYTEBASE_PROJECT: 'projects/default' 
        run: |
          /app/bytebase-action rollout --url=${{ env.BYTEBASE_URL }} --project=${{ env.BYTEBASE_PROJECT }} --file-pattern='migrations/*.sql'
