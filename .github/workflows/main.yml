name: Deploy Migrations via Bytebase

on:
  push:
    branches: [master]
    paths:
      - 'migrations/**'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Login to Bytebase
        id: login
        shell: pwsh
        run: |
          Write-Host "Authenticating with Bytebase..."

          $body = @{
            email    = "${{ secrets.BYTEBASE_SERVICE_ACCOUNT }}"
            password = "${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}"
            web      = $true
          } | ConvertTo-Json

          try {
            $response = Invoke-RestMethod -Uri "${{ secrets.BYTEBASE_URL }}/v1/auth/login" `
              -Method POST `
              -ContentType "application/json" `
              -Body $body
          } catch {
            Write-Host "Failed to authenticate!"
            Write-Host "Error: $_"
            Write-Host "Response: $($_.Exception.Response)"
            exit 1
          }

          $token = $response.accessToken
          if (-not $token) { $token = $response.token }

          if (-not $token) {
            Write-Host "No token in response!"
            Write-Host "Response: $($response | ConvertTo-Json)"
            exit 1
          }

          "token=$token" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          Write-Host "Successfully authenticated with Bytebase"

      - name: Test connectivity
        shell: pwsh
        run: |
          $token = "${{ steps.login.outputs.token }}"
          $headers = @{ Authorization = "Bearer $token" }

          $response = Invoke-RestMethod -Uri "${{ secrets.BYTEBASE_URL }}/v1/${{ secrets.BYTEBASE_PROJECT }}/databases" `
            -Method GET `
            -Headers $headers

          Write-Host "Databases:"
          $response | ConvertTo-Json -Depth 5
