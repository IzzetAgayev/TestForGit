name: Bytebase GitOps
on:
  push:
    branches:
      - master  # I noticed your branch in the screenshot is "master", not "main"
    paths:
      - 'migrations/**'
jobs:
  bytebase-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bytebase Release
        uses: bytebase/bytebase-action@v1
        with:
          bytebase-url: ${{ vars.BYTEBASE_URL }}
          service-key: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}
          base-dir: 'migrations'
