name: Bytebase GitOps
on:
  push:
    branches:
      - master
    paths:
      - 'migrations/**'

jobs:
  bytebase-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Roll out database change
        uses: bytebase/actions@v1
        with:
          bytebase-url: ${{ vars.BYTEBASE_URL }}
          service-account: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT }}
          service-account-secret: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}
          project: 'projects/default'
          file-pattern: 'migrations/*.sql'
