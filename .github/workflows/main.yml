name: Bytebase GitOps
on:
  push:
    branches:
      - master
    paths:
      - 'migrations/**'

jobs:
  bytebase-release:
    runs-on: ubuntu-latest
    # This is the "secret sauce" to fix the 'not found' error
    container:
      image: bytebase/bytebase-action:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Roll out database change
        env:
          BYTEBASE_URL: ${{ vars.BYTEBASE_URL }}
          BYTEBASE_SERVICE_ACCOUNT: 'api@service.bytebase.com' # Use your Service Account Email
          BYTEBASE_SERVICE_ACCOUNT_SECRET: ${{ secrets.BYTEBASE_SERVICE_ACCOUNT_SECRET }}
          # Update this with your actual Project ID (e.g., 'projects/sample')
          BYTEBASE_PROJECT: 'projects/default' 
        run: |
          bytebase-action rollout --url=${{ env.BYTEBASE_URL }} --project=${{ env.BYTEBASE_PROJECT }} --file-pattern='migrations/*.sql'
